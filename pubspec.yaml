name: love_app
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  animated_splash_screen: ^1.3.0
  flutter_native_splash: ^2.4.4
  flutter_launcher_icons: ^0.14.2
  lottie: ^3.3.1
  google_fonts: ^8.0.1
  http: ^1.2.0
  shared_preferences: ^2.2.2
  web_socket_channel: ^3.0.3
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3+1
  flutter_local_notifications: ^21.0.0
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  path: ^1.9.0
  connectivity_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/lottie_animated_splash_screen.json
    - assets/drop_purple_water.json
    - assets/icon_app.png
    - assets/bg_icon.png
    - assets/native_splash.png
    - assets/frog.png
    - assets/duck.png
    - assets/google_fonts/
